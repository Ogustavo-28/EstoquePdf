<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque de Calças</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #18bc9c;
            --light: #ecf0f1;
            --dark: #34495e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f6fa;
            color: var(--dark);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Abas de Navegação */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            gap: 5px;
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background-color: #dcdde1;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border-radius: 5px;
            flex: 1;
            max-width: 200px;
            font-size: 14px;
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: white;
        }

        /* Conteúdo das Abas */
        .tab-content {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 0 auto;
        }

        .tab-content.active {
            display: block;
        }

        h2 {
            margin-bottom: 20px;
            border-bottom: 2px solid var(--light);
            padding-bottom: 10px;
            color: var(--primary);
        }

        /* Grid de Cores e Tamanhos */
        .color-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 5px solid var(--secondary);
        }

        .color-title {
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .grid-tamanhos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 12px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .input-group input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 16px; /* Evita zoom automático no iOS */
        }

        /* Botão de Ação */
        .btn-pdf {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 30px auto 0 auto;
            padding: 15px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .btn-pdf:hover {
            opacity: 0.9;
        }

        /* Responsividade para Celulares Pequenos */
        @media (max-width: 480px) {
            .tabs {
                flex-direction: column;
            }
            .tab-btn {
                max-width: 100%;
            }
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Controle de Estoque</h1>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'caixas')">Caixas no Estoque</button>
        <button class="tab-btn" onclick="openTab(event, 'sacos')">Sacos fora da Caixa</button>
        <button class="tab-btn" onclick="openTab(event, 'chegar')">Calças para Chegar</button>
    </div>

    <div id="caixas" class="tab-content active">
        <h2>Quantidade de Caixas</h2>
        <div id="container-caixas"></div>
    </div>

    <div id="sacos" class="tab-content">
        <h2>Sacos Fora da Caixa</h2>
        <div id="container-sacos"></div>
    </div>

    <div id="chegar" class="tab-content">
        <h2>Calças para Chegar</h2>
        <div id="container-chegar"></div>
    </div>

    <button class="btn-pdf" onclick="gerarPDF()">Gerar Relatório PDF</button>

    <script>
        // Configurações das variações
        const tamanhos = ['P', 'M', 'G', 'GG', 'G1'];
        const cores = ['Preto', 'Branco', 'Off White', 'Cinza', 'Chumbo', 'Azul Marinho'];

        // Função para alternar entre as abas
        function openTab(evt, tabId) {
            const tabcontents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < tabcontents.length; i++) {
                tabcontents[i].classList.remove("active");
            }
            const tablinks = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // Função para renderizar os campos de entrada dinamicamente
        function criarFormulario(containerId, prefixoId) {
            const container = document.getElementById(containerId);
            
            cores.forEach(cor => {
                const colorSection = document.createElement('div');
                colorSection.className = 'color-section';
                
                const title = document.createElement('div');
                title.className = 'color-title';
                title.innerText = cor;
                colorSection.appendChild(title);
                
                const grid = document.createElement('div');
                grid.className = 'grid-tamanhos';
                
                tamanhos.forEach(tamanho => {
                    const inputGroup = document.createElement('div');
                    inputGroup.className = 'input-group';
                    
                    const label = document.createElement('label');
                    label.innerText = tamanho;
                    
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '0';
                    input.placeholder = '0';
                    // Cria um ID único, ex: caixas-Preto-P
                    input.id = `${prefixoId}-${cor}-${tamanho}`;
                    
                    inputGroup.appendChild(label);
                    inputGroup.appendChild(input);
                    grid.appendChild(inputGroup);
                });
                
                colorSection.appendChild(grid);
                container.appendChild(colorSection);
            });
        }

        // Inicializa os formulários nas três abas
        criarFormulario('container-caixas', 'caixas');
        criarFormulario('container-sacos', 'sacos');
        criarFormulario('container-chegar', 'chegar');

        // Função para gerar o PDF
        async function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            let y = 20; // Posição vertical inicial no PDF
            
            // Título do PDF
            doc.setFontSize(18);
            doc.text("Relatório de Estoque de Calças", 14, y);
            y += 10;
            
            // Data do relatório
            doc.setFontSize(10);
            doc.text(`Gerado em: ${new Date().toLocaleString('pt-BR')}`, 14, y);
            y += 15;

            const abas = [
                { id: 'caixas', titulo: '1. Caixas no Estoque' },
                { id: 'sacos', titulo: '2. Sacos Fora da Caixa' },
                { id: 'chegar', titulo: '3. Calças para Chegar' }
            ];

            abas.forEach(aba => {
                // Adiciona o título da seção se houver espaço, senão cria nova página
                if (y > 260) { doc.addPage(); y = 20; }
                
                doc.setFontSize(14);
                doc.setFont(undefined, 'bold');
                doc.text(aba.titulo, 14, y);
                y += 8;
                
                doc.setFontSize(10);
                doc.setFont(undefined, 'normal');

                let temDados = false;

                cores.forEach(cor => {
                    let linhaCor = `${cor}: `;
                    let dadosCor = [];
                    
                    tamanhos.forEach(tamanho => {
                        const input = document.getElementById(`${aba.id}-${cor}-${tamanho}`);
                        const valor = input.value || 0;
                        
                        if (valor > 0) {
                            dadosCor.push(`${tamanho}: ${valor}`);
                            temDados = true;
                        }
                    });

                    if (dadosCor.length > 0) {
                        if (y > 270) { doc.addPage(); y = 20; }
                        doc.text(`   • ${linhaCor} [ ${dadosCor.join(' | ')} ]`, 14, y);
                        y += 6;
                    }
                });

                if (!temDados) {
                    doc.text("   Nenhum item registrado nesta categoria.", 14, y);
                    y += 6;
                }
                
                y += 6; // Espaço entre as seções
            });

            // Salva o PDF com o nome especificado
            doc.save('relatorio-estoque.pdf');
        }
    </script>
</body>
</html>
